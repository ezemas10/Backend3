# https://swagger.io/docs/specification/describing-request-body/

paths:
  /api/users/:
    get:
      summary: Obtiene todos los usuarios
      tags:
        - Users
      responses:
        "200":
          description: Los usuarios fueron obtenidos OK desde la DB
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      type: object
        "500":
          description: Error interno del servidor

  /api/users/{uid}:
    get:
      summary: Obtiene un usuario de la base de datos
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: id del usuario que se esta solicitando
          schema:
            type: string
      responses:
        "200":
          description: Recupera un usuario de la DB, segun el uid que enviamos en la ruta como parametro
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: object
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: string
                    example: User not found
        "500":
          description: Error interno del servidor

    put:
      summary: Actualiza un usuario de la base de datos
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: id del usuario que se quiere actualizar
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Usuario actualizado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User updated
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: string
                    example: User not found
        "500":
          description: Error interno del servidor

    delete:
      summary: Elimina un usuario de la base de datos
      tags:
        - Users
      parameters:
        - name: uid
          in: path
          required: true
          description: id del usuario que se quiere eliminar
          schema:
            type: string
      responses:
        "200":
          description: Usuario eliminado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User deleted
        "500":
          description: Error interno del servidor